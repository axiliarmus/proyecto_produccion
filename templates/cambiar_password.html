{% extends 'base.html' %}
{% block title %}Cambiar Contraseña{% endblock %}

{% block content %}
<div class="card bg-dark text-light shadow mx-auto" style="max-width: 500px;">
  <div class="card-body">
    <h3 class="text-center mb-3">🔐 Cambiar contraseña</h3>

    <form method="POST">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label class="form-label">Nueva contraseña</label>
        <div class="input-group">
          <input type="password" name="password_nueva" id="password_nueva" class="form-control bg-secondary text-light" required>
          <button type="button" class="btn btn-outline-secondary" data-toggle-password="password_nueva" aria-label="Mostrar contraseña">Mostrar</button>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Repetir contraseña</label>
        <div class="input-group">
          <input type="password" name="password_repetir" id="password_repetir" class="form-control bg-secondary text-light" required>
          <button type="button" class="btn btn-outline-secondary" data-toggle-password="password_repetir" aria-label="Mostrar contraseña">Mostrar</button>
        </div>
      </div>

      <button class="btn btn-accent w-100 mt-3">Actualizar contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
